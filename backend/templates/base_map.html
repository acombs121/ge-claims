<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src 'none'">
    <title>High-Fidelity Dynamic Map Showcase</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg-blur: rgba(15, 23, 42, 0.9);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(51, 65, 85, 0.8);
            --accent-primary: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
        }
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; overflow: hidden; background: #090d16; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Dynamic pronounced colors for clouds and wind overlays */
        .clouds-tile-layer {
            filter: grayscale(0.1) brightness(1.15);
        }
        .wind-tile-layer {
            filter: saturate(1.15);
        }
        
        /* Prevent default Leaflet white square/black border background overlays */
        .custom-div-icon {
            background: transparent !important;
            border: none !important;
        }
        
        /* High-contrast dynamic color inversion for Light Theme map backgrounds! */
        [data-theme="light"] .clouds-tile-layer {
            filter: invert(0.85) contrast(1.85) brightness(0.8); /* Dark/slate pronounced clouds */
        }
        [data-theme="light"] .wind-tile-layer {
            filter: hue-rotate(190deg) contrast(1.5) brightness(0.8); /* Vibrant high-contrast wind velocities */
        }
        
        .floating-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-blur);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            width: 240px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .legend-panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            background: var(--bg-blur);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.8rem;
            color: var(--text-primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        .pulse-marker {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pulse-dot {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #ffffff;
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid var(--accent-primary);
            animation: radarPulse 2.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes radarPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(3.8); opacity: 0; }
        }
        
        .control-group { margin-bottom: 16px; }
        .control-group:last-child { margin-bottom: 0; }
        .control-label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 6px; }
        
        .select-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #0f172a;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .select-input:focus { border-color: var(--accent-primary); }
        
        .route-info {
            font-size: 0.82rem;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        @keyframes dashflow {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }
        .animated-route {
            animation: dashflow 1.8s linear infinite;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="floating-panel">
        <div class="control-group">
            <label class="control-label">Optimization Strategy</label>
            <select class="select-input" id="routeSelect" onchange="window.updateRoute()">
                <option value="shortest_distance">Shortest Distance</option>
                <option value="account_priority">Account Priority</option>
            </select>
        </div>

        <div class="control-group">
            <label class="control-label">Visual Base Layer</label>
            <select class="select-input" id="themeSelect" onchange="window.updateTheme()">
                <option value="light" selected>Charcoal Light Theme</option>
                <option value="dark">Charcoal Dark Matter</option>
                <option value="osm">OpenStreetMap Standard</option>
                <option value="satellite">Esri World Satellite</option>
            </select>
        </div>

        <div class="control-group" id="layerToggles">
            <label class="control-label">Dynamic Overlays</label>
            <label style="display: flex; align-items: center; gap: 10px; font-size: 0.82rem; cursor: pointer; margin-bottom: 6px;">
                <input type="checkbox" id="heatToggle" onchange="window.toggleHeatmap()"> 
                Demand Heatmap (L.heat)
            </label>
            <label style="display: flex; align-items: center; gap: 10px; font-size: 0.82rem; cursor: pointer; margin-bottom: 6px;">
                <input type="checkbox" id="cloudsToggle" onchange="window.toggleClouds()"> 
                Live Clouds Cover (OWM)
            </label>
            <label style="display: flex; align-items: center; gap: 10px; font-size: 0.82rem; margin-bottom: 6px; cursor: pointer;">
                <input type="checkbox" id="windToggle" onchange="window.toggleWind()"> 
                Wind Velocity (OWM)
            </label>
            <label style="display: flex; align-items: center; gap: 10px; font-size: 0.82rem; cursor: pointer; margin-bottom: 6px;">
                <input type="checkbox" id="trafficToggle" onchange="window.toggleTraffic()"> 
                Live Traffic Congestion (OSM)
            </label>
            <label style="display: flex; align-items: center; gap: 10px; font-size: 0.82rem; cursor: pointer;">
                <input type="checkbox" id="poiToggle" onchange="window.togglePOIs()"> 
                Local Restaurants & Shops (OSM)
            </label>
        </div>

        <div class="route-info" id="routeInfo">
            Distance: --<br>
            Duration: --
        </div>
    </div>

    <div class="legend-panel">
        <div style="font-weight:700; margin-bottom:8px; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-secondary);">Map Legend</div>
        <div class="legend-item">
            <div class="legend-color" style="background:#ef4444;"></div>
            <span>Critical Priority Node</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#f97316;"></div>
            <span>Medium Warning Node</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#facc15;"></div>
            <span>Normal Hub Node</span>
        </div>
    </div>

    <script>
        let map;
        let heatLayer;
        let cloudsLayer;
        let windLayer;
        let trafficLayer;
        let poiLayer;
        let activeRouteLayer;
        let baseTileLayers = {};
        let data = {};
        let config = {};

        function init() {
            data = window.INJECTED_DATA || {
                center: [42.3601, -71.0589],
                zoom: 13,
                heatmap_points: [],
                routes: {}
            };
            config = data.config || {};

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(data.center || [42.3601, -71.0589], data.zoom || 13);
            L.control.zoom({ position: 'topleft' }).addTo(map);

            // Pre-populate beautiful map base layers
            baseTileLayers['dark'] = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '' });
            baseTileLayers['light'] = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '' });
            baseTileLayers['osm'] = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' });
            baseTileLayers['satellite'] = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '' });

            // Default Base Layer (Light Theme)
            baseTileLayers['light'].addTo(map);

            // Feature Flag: Overlays Control Menu
            if (config.enableHeatmap || config.enableWeatherStub) {
                document.getElementById('layerToggles').style.display = 'block';
            }

            // Listen to window resize to dynamically recalculate map layout bounds (CSP compliant)
            window.addEventListener('resize', () => {
                if (map) map.invalidateSize();
            });

            // Initialize dynamic Heatmap overlay
            if (config.enableHeatmap && data.heatmap_points && data.heatmap_points.length > 0) {
                const heatPoints = data.heatmap_points.map(p => [p[0], p[1], p[2] || 0.5]);
                heatLayer = L.heatLayer(heatPoints, { radius: 30, blur: 18, minOpacity: 0.4 });
                document.getElementById('heatToggle').checked = true;
                
                // Force size recalculation and defer canvas attachment to ensure parent DOM is visible
                setTimeout(() => {
                    if (map) {
                        map.invalidateSize();
                        if (map.getSize().x > 0) {
                            heatLayer.addTo(map);
                        }
                    }
                }, 250);
            }

            // Pre-wire OWM Clouds Cover Layer (Completely free, stable, verified active AppKey!)
            cloudsLayer = L.tileLayer('https://tile.openweathermap.org/map/clouds_new/{z}/{x}/{y}.png?appid=b1b15e88fa797225412429c1c50c122a1', {
                className: 'clouds-tile-layer', // Bind dynamic light-inverting CSS filter
                opacity: 0.8,      // Increased opacity to make dynamic clouds beautifully pronounced
                zIndex: 101,
                maxZoom: 18
            });
            cloudsLayer.on('tileerror', (err) => console.error("📡 [LEAFLET-CLOUDS] OWM Cloud tile load failed! URL: ", err.tile.src));
            cloudsLayer.on('load', () => console.log("📡 [LEAFLET-CLOUDS] OWM Cloud Cover layer fully loaded and visible!"));

            // Pre-wire OWM Wind Velocity Layer (Utilizes verified active, public OpenWeatherMap tile AppKey!)
            windLayer = L.tileLayer('https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=b1b15e88fa797225412429c1c50c122a1', {
                className: 'wind-tile-layer',   // Bind dynamic light-rotating CSS filter
                opacity: 0.8,      // Increased opacity to make active wind bands beautifully pronounced
                zIndex: 92,
                maxZoom: 18
            });
            windLayer.on('tileerror', (err) => console.error("📡 [LEAFLET-WIND] OWM Wind tile load failed! URL: ", err.tile.src));
            windLayer.on('load', () => console.log("📡 [LEAFLET-WIND] OWM Wind Velocity layer fully loaded!"));

            // Pre-wire Standard OpenStreetMap live GPS traces flow layer (100% key-free, universally available, CSP compliant!)
            trafficLayer = L.tileLayer('https://{s}.gps-tile.openstreetmap.org/lines/{z}/{x}/{y}.png', {
                opacity: 0.55,
                zIndex: 95,
                maxZoom: 18
            });
            trafficLayer.on('tileerror', (err) => console.error("📡 [LEAFLET-TRAFFIC] OpenStreetMap GPS flow tile failed. URL: ", err.tile.src));
            trafficLayer.on('load', () => console.log("📡 [LEAFLET-TRAFFIC] Live GPS Traffic Congestion layer fully loaded!"));

            // Pre-wire Dynamic Local Restaurants & Shops POIs Layer Group
            poiLayer = L.layerGroup();
            if (data.local_pois) {
                data.local_pois.forEach(p => {
                    let color = '#6366f1'; // Default Indigo for Shops
                    let labelType = 'Shop';
                    if (p.type === 'restaurant') {
                        color = '#10b981'; // Emerald for Restaurants
                        labelType = p.cuisine ? `${p.cuisine} Restaurant` : 'Restaurant';
                    } else if (p.type === 'cafe') {
                        color = '#f59e0b'; // Amber for Cafes
                        labelType = 'Cafe';
                    }
                    
                    const poiHtml = `
                        <div class="poi-marker" style="width:10px; height:10px; border-radius:50%; background:${color}; border:2px solid #f8fafc; box-shadow: 0 0 6px ${color};"></div>
                    `;
                    
                    const poiIcon = L.divIcon({
                        html: poiHtml,
                        className: 'custom-div-icon',
                        iconSize: [10, 10],
                        iconAnchor: [5, 5]
                    });
                    
                    L.marker([p.lat, p.lng], { icon: poiIcon })
                    .bindTooltip(
                        `<div style="font-family:'Outfit', sans-serif; font-size:12px; color:#0f172a; padding:4px;"><b>${p.name}</b><br/><span style="color:#475569; font-size:10px;">${labelType}</span></div>`,
                        { className: 'custom-tooltip', direction: 'top' }
                    ).addTo(poiLayer);
                });
            }
            
            // Defer layer additions slightly past resize checks to guarantee native zoom constraints are enforced
            setTimeout(() => {
                if (map) {
                    map.invalidateSize();
                    console.log(`📊 [LEAFLET-INIT] Deferred layer load checks starting. Map size: ${map.getSize().x}px x ${map.getSize().y}px`);
                    
                    // Render OWM clouds by default
                    document.getElementById('cloudsToggle').checked = true;
                    console.log("📡 [LEAFLET-CLOUDS] Attaching clouds cover...");
                    cloudsLayer.addTo(map);
                    
                    // Render OSM traffic by default
                    document.getElementById('trafficToggle').checked = true;
                    console.log("📡 [LEAFLET-TRAFFIC] Attaching GPS traces flow...");
                    trafficLayer.addTo(map);
                    
                    // Check & Render OSM local POIs by default for instant visual aesthetic
                    document.getElementById('poiToggle').checked = true;
                    console.log("📡 [LEAFLET-POIS] Attaching local cafes, eateries and shops...");
                    poiLayer.addTo(map);
                }
            }, 300);

            // Render custom radar pulsing markers
            if (data.markers) {
                data.markers.forEach((p, index) => {
                    const intensity = p[2] || 0.5;
                    const name = p[3] || 'Account';
                    const status = p[4] || 'Active';
                    
                    const dotSize = 12 + (intensity * 14);
                    const ringSize = dotSize * 2.8;
                    const animDuration = 2.5 - (intensity * 1.3);
                    
                    let color = '#facc15';
                    if (intensity > 0.8) color = '#ef4444';
                    else if (intensity > 0.4) color = '#f97316';
                    
                    const opacity = 0.4 + (intensity * 0.6);
                    
                    const iconHtml = `
                        <div class="pulse-marker" style="width:${dotSize}px; height:${dotSize}px;">
                            <div class="pulse-ring" style="width:${ringSize}px; height:${ringSize}px; animation-duration:${animDuration}s; border-color:${color}; opacity:${opacity};"></div>
                            <div class="pulse-dot" style="width:${dotSize}px; height:${dotSize}px; background:${color}; opacity:${opacity}; box-shadow: 0 0 10px ${color};"></div>
                        </div>
                    `;
                    
                    const customIcon = L.divIcon({
                        html: iconHtml,
                        className: 'custom-div-icon',
                        iconSize: [dotSize, dotSize],
                        iconAnchor: [dotSize/2, dotSize/2]
                    });
                    
                    L.marker([p[0], p[1]], { icon: customIcon })
                    .bindTooltip(
                        `<div style="font-family:'Outfit', sans-serif; font-size:12px; color:#0f172a; padding:4px;"><b>${name}</b><br/><span style="color:#475569; font-size:10px;">Priority #${index + 1} | ${status}</span></div>`, 
                        { className: 'custom-tooltip', direction: 'top', offset: [0, -dotSize/2] }
                    ).addTo(map);

                    // REFERENCE SPEC: How to securely bind interactive buttons inside Leaflet popups
                    // that bypass sandboxed iframe string sanitization and bridge click actions back to the parent
                    /*
                    const popupDiv = document.createElement('div');
                    popupDiv.style = "padding: 4px; font-family: 'Outfit', sans-serif; font-size: 12px;";
                    popupDiv.innerHTML = `<b>${name}</b><br/><span style="font-size: 10px; color: #475569;">${status}</span>`;
                    
                    const btn = document.createElement('button');
                    btn.textContent = 'Audit Triage Site';
                    btn.style = "display:block; width:100%; margin-top:8px; background:#2563eb; color:#fff; border:none; padding:6px; border-radius:4px; cursor:pointer; font-weight:600;";
                    
                    btn.addEventListener('click', () => {
                        console.log(`[A2UI-MAP-CLICK] Action clicked for: ${name}`);
                        if (window.parent) {
                            window.parent.postMessage({
                                type: 'a2ui_action',
                                action: 'deep_dive_site',
                                data: { site_id: name }
                            }, '*');
                        }
                    });
                    popupDiv.appendChild(btn);
                    
                    L.marker([p[0], p[1]], { icon: customIcon })
                    .bindPopup(popupDiv, { offset: [0, -dotSize/2] })
                    .addTo(map);
                    */
                });
            }

            // Fit bounds
            if (data.heatmap_points && data.heatmap_points.length > 0) {
                const bounds = L.latLngBounds(data.heatmap_points.map(p => [p[0], p[1]]));
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
            }

            // Trigger Initial Route
            window.updateRoute();
        }

        window.toggleHeatmap = function() {
            const checked = document.getElementById('heatToggle').checked;
            if (checked && heatLayer) {
                heatLayer.addTo(map);
            } else if (heatLayer) {
                map.removeLayer(heatLayer);
            }
        }

        window.toggleClouds = function() {
            const checked = document.getElementById('cloudsToggle').checked;
            if (checked && cloudsLayer) {
                cloudsLayer.addTo(map);
            } else if (cloudsLayer) {
                map.removeLayer(cloudsLayer);
            }
        }

        window.toggleTemperature = function() {
            const checked = document.getElementById('tempToggle').checked;
            if (checked && temperatureLayer) {
                temperatureLayer.addTo(map);
            } else if (temperatureLayer) {
                map.removeLayer(temperatureLayer);
            }
        }

        window.toggleWind = function() {
            const checked = document.getElementById('windToggle').checked;
            if (checked && windLayer) {
                windLayer.addTo(map);
            } else if (windLayer) {
                map.removeLayer(windLayer);
            }
        }

        window.toggleTraffic = function() {
            const checked = document.getElementById('trafficToggle').checked;
            if (checked && trafficLayer) {
                trafficLayer.addTo(map);
            } else if (trafficLayer) {
                map.removeLayer(trafficLayer);
            }
        }

        window.togglePOIs = function() {
            const checked = document.getElementById('poiToggle').checked;
            if (checked && poiLayer) {
                poiLayer.addTo(map);
            } else if (poiLayer) {
                map.removeLayer(poiLayer);
            }
        }

        window.updateTheme = function() {
            const theme = document.getElementById('themeSelect').value;
            
            // Discard old layers
            Object.keys(baseTileLayers).forEach(k => map.removeLayer(baseTileLayers[k]));
            
            // Apply selected
            baseTileLayers[theme].addTo(map);
        }

        window.updateRoute = function() {
            const select = document.getElementById('routeSelect');
            const routeType = select.value;
            const routeData = data.routes ? data.routes[routeType] : null;

            if (!routeData) return;

            if (activeRouteLayer) {
                map.removeLayer(activeRouteLayer);
            }

            activeRouteLayer = L.polyline(routeData.coordinates, {
                color: '#38bdf8',
                weight: 6,
                opacity: 0.85,
                dashArray: '12, 12',
                className: 'animated-route'
            }).addTo(map);

            const infoDiv = document.getElementById('routeInfo');
            infoDiv.innerHTML = `<b>OPTIMIZED STATS:</b><br/>Distance: ${routeData.distance}<br/>Duration: ${routeData.duration}`;
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
