<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src 'none'">
    <title>Trip Planner - Refined Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-blur: rgba(255, 255, 255, 0.95);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: rgba(226, 232, 240, 0.9);
            --accent-primary: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.3);
            --success: #10b981;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-blur: rgba(30, 41, 59, 0.95);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(51, 65, 85, 0.9);
            --accent-primary: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #0f172a;
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }

        .floating-panel {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 250px;
        }

        .route-card {
            background: var(--bg-blur);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
        }

        .route-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .route-card.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-glow);
            background: var(--bg-blur);
        }

        [data-theme="dark"] .route-card.active {
            background: #0f172a;
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .route-details {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .route-card.active .route-details {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .val-danger {
            color: var(--danger);
        }

        .val-success {
            color: var(--success);
        }

        .commit-btn {
            background: var(--accent-primary);
            color: #fff;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px -2px var(--accent-glow);
        }

        .commit-btn:hover {
            filter: brightness(1.1);
        }

        .commit-btn:active {
            transform: translateY(1px);
        }

        .custom-tooltip {
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
        }

        .custom-tooltip.leaflet-tooltip-top:before {
            border-top-color: #1e293b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes dashflow {
            from {
                stroke-dashoffset: 40;
            }

            to {
                stroke-dashoffset: 0;
            }
        }

        .animated-route {
            animation: dashflow 1.5s linear infinite;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div class="floating-panel">
        <!-- Cards generated dynamically -->
    </div>

    <script>
        let map;
        let inactivePolylines = [];
        let activeEntity = null;
        let routesData = [];
        let heatLayer;

        function init() {
            const data = window.INJECTED_DATA || {
                center: [42.3554, -71.0664],
                zoom: 14,
                heatmap_points: [
                    [42.3554, -71.0664, 0.8],
                    [42.3600, -71.0560, 0.9],
                    [42.3662, -71.0621, 0.7]
                ],
                routes: [
                    {
                        id: 'route_efficiency',
                        name: 'Route Efficiency',
                        eta: '18 mins',
                        cost: '+$14k',
                        color: '#38bdf8',
                        dashArray: '10, 15',
                        coords: [[42.3554, -71.0664], [42.3662, -71.0621], [42.3600, -71.0560]],
                        origin: 'Boston Common'
                    }
                ]
            };

            if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(data.center || [42.3554, -71.0664], data.zoom || 14);
            L.control.zoom({ position: 'topleft' }).addTo(map);

            const tileUrl = isDark
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

            L.tileLayer(tileUrl, { attribution: '' }).addTo(map);

            routesData = data.routes || [];

            // Add Heatmap
            if (data.heatmap_points) {
                heatLayer = L.heatLayer(data.heatmap_points, {
                    radius: 35,
                    blur: 15,
                    max: 1.0
                }).addTo(map);
            }

            // Generate Cards Dynamically
            const panel = document.querySelector('.floating-panel');
            panel.innerHTML = '';
            routesData.forEach(route => {
                const card = document.createElement('div');
                card.className = 'route-card';
                card.id = 'card-' + route.id;
                card.onclick = () => window.selectVector(route.id);
                card.innerHTML = `
                    <div class="route-header">
                        <div>${route.name}</div>
                    </div>
                    <div class="route-details">
                        <div class="stat-grid">
                            <div>
                                <div class="stat-label">ETA</div>
                                <div class="stat-value">${route.eta}</div>
                            </div>
                            <div>
                                <div class="stat-label">IMPACT</div>
                                <div class="stat-value val-success">${route.cost}</div>
                            </div>
                        </div>
                    </div>
                `;
                panel.appendChild(card);
            });

            // Render all routes initially as inactive/faint
            routesData.forEach(route => {
                const poly = L.polyline(route.coords, {
                    color: '#64748b',
                    weight: 3,
                    opacity: 0.4,
                    dashArray: null
                }).addTo(map);
                inactivePolylines.push({ id: route.id, layer: poly });
            });

            // Add Markers for accounts from heatmap points
            if (data.heatmap_points) {
                data.heatmap_points.forEach(p => {
                    const marker = L.circleMarker([p[0], p[1]], {
                        radius: 6,
                        fillColor: '#ef4444',
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.8
                    }).addTo(map);
                    
                    if (p.length > 3 && p[3]) {
                        marker.bindTooltip(`<b>${p[3]}</b>`, { className: 'custom-tooltip', direction: 'top', permanent: true });
                    }
                });
            }

            // Fit initial view to encompass all rendered routes if any
            if (routesData.length > 0) {
                const allCoords = routesData.flatMap(r => r.coords);
                map.fitBounds(L.latLngBounds(allCoords), { padding: [50, 50], animate: true });
            }
        }

        window.selectVector = function (routeId) {
            const card = document.getElementById('card-' + routeId);

            // Un-toggle logic
            if (card.classList.contains('active')) {
                card.classList.remove('active');
                if (activeEntity) {
                    map.removeLayer(activeEntity.line);
                    map.removeLayer(activeEntity.marker);
                    activeEntity = null;
                }
                inactivePolylines.forEach(p => p.layer.setStyle({ opacity: 0.4, weight: 3 }));
                if (routesData.length > 0) {
                    const allCoords = routesData.flatMap(r => r.coords);
                    map.fitBounds(L.latLngBounds(allCoords), { padding: [50, 50], animate: true, duration: 0.6 });
                }
                return;
            }

            // Update Card UI Highlighting
            document.querySelectorAll('.route-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');

            // Reset previously active map layers
            if (activeEntity) {
                map.removeLayer(activeEntity.line);
                map.removeLayer(activeEntity.marker);
                activeEntity = null;
            }

            // Bring back all faint lines
            inactivePolylines.forEach(p => p.layer.setStyle({ opacity: 0.4, weight: 3 }));

            // Find Target Route configuration
            const route = routesData.find(r => r.id === routeId);
            if (!route) return;

            // Hide the target's faint line so the active line draws cleanly over it
            inactivePolylines.find(p => p.id === routeId).layer.setStyle({ opacity: 0 });

            // Draw Emphasized Active Line
            const activeLine = L.polyline(route.coords, {
                color: route.color,
                weight: 5,
                opacity: 1,
                dashArray: route.dashArray,
                className: route.dashArray ? 'animated-route' : ''
            }).addTo(map);

            // Drop Marker at Origin Node
            const startPt = route.coords[0];
            const marker = L.circleMarker(startPt, {
                radius: 6, fillColor: route.color, color: '#fff', weight: 2, fillOpacity: 1
            }).bindTooltip(`<b>${route.origin || 'Origin'}</b>`, { className: 'custom-tooltip', direction: 'top' }).addTo(map);

            activeEntity = { line: activeLine, marker: marker };

            // Physically swoop the camera to map bounds
            map.fitBounds(activeLine.getBounds(), { padding: [100, 100], animate: true, duration: 0.6 });
        }

        window.commitToErp = function (event, routeId) {
            event.stopPropagation(); // Stop parent route card from catching the click

            const route = routesData.find(r => r.id === routeId);
            const btn = event.target;

            const payload = {
                action_type: 'REROUTE_COMMIT',
                vector: route.id,
                name: route.name,
                projected_cost: route.cost,
                projected_eta: route.eta,
                timestamp: new Date().toISOString()
            };

            console.log("Simulating ERP Commit with payload:", payload);

            btn.innerHTML = 'Executing...';
            setTimeout(() => {
                btn.innerHTML = '✓ Success';
                btn.style.background = 'var(--success)';
                btn.style.color = '#fff';
            }, 1000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
