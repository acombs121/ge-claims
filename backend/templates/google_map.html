<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Secure CSP connect-src strictly 'none' to satisfy enterprise widgets audits -->
    <meta http-equiv="Content-Security-Policy" content="connect-src 'none'">
    <title>Premium Google Maps Directions Showcase</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --border-color: #334155;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        .floating-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            width: 260px;
        }
        .info-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-primary);
            margin-bottom: 6px;
        }
        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .info-sub {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
    </style>
    <!-- Dynamic script placeholder replaced at serve-time with os.environ key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY_HERE"></script>
</head>
<body>
    <div id="map"></div>
    
    <div class="floating-info">
        <div class="info-title">DYNAMIC ROAD ROUTE</div>
        <div class="info-value" id="route-summary">Calculating...</div>
        <div class="info-sub" id="route-desc">Querying premium Google Maps Javascript directions service...</div>
    </div>

    <script>
        function initMap() {
            const data = window.INJECTED_DATA || {};
            
            // Premium Dark Mode map theme styling JSON
            const darkStyle = [
                { elementType: "geometry", stylers: [{ color: "#1e293b" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#1e293b" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#94a3b8" }] },
                { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#38bdf8" }] },
                { featureType: "road", elementType: "geometry", stylers: [{ color: "#0f172a" }] },
                { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#334155" }] },
                { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#64748b" }] },
                { featureType: "water", elementType: "geometry", stylers: [{ color: "#090d16" }] },
                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#475569" }] }
            ];

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: { lat: 42.3601, lng: -71.0589 }, // Boston Common Center
                styles: darkStyle,
                disableDefaultUI: true,
                zoomControl: true
            });

            const directionsService = new google.maps.DirectionsService();
            const directionsRenderer = new google.maps.DirectionsRenderer({
                map: map,
                suppressMarkers: false,
                polylineOptions: {
                    strokeColor: "#38bdf8",
                    strokeWeight: 6,
                    strokeOpacity: 0.85
                }
            });

            directionsService.route({
                origin: "Boston Common, Boston, MA",
                destination: "North End, Boston, MA",
                travelMode: google.maps.TravelMode.DRIVING
            }, function(response, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(response);
                    
                    const leg = response.routes[0].legs[0];
                    document.getElementById("route-summary").innerText = `${leg.distance.text} (${leg.duration.text})`;
                    document.getElementById("route-desc").innerText = `Dynamically calculated core road directions via dynamic Maps Javascript Directions SDK.`;
                } else {
                    document.getElementById("route-summary").innerText = "Calculation Failed";
                    document.getElementById("route-desc").innerText = `Directions API request failed with status: ${status}`;
                }
            });
        }
        
        // Trigger on page load
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
