<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src 'none'">
    <title>Universal Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY_HERE&libraries=visualization"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="/theme.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            font-size: 14px;
            overflow-x: hidden;
        }
        .dashboard-header {
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dashboard-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dashboard-header p {
            color: var(--text-secondary);
            margin: 4px 0 0 0;
        }
        .kpi-container {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .kpi-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .kpi-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-primary);
            margin-right: 6px;
            margin-bottom: 1px;
        }
        .kpi-card.warning .kpi-title::before { background: var(--warning); }
        .kpi-card.success .kpi-title::before { background: var(--success); }
        .kpi-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 4px 0;
        }
        .kpi-sub {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .main-grid > .panel:last-child:nth-child(odd), .panel.full-width {
            grid-column: 1 / -1;
        }
        .panel-header {
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
        }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
        }
        .badge.high { background-color: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.medium { background-color: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .d3-tooltip { position: absolute; text-align: center; padding: 6px 10px; font-size: 11px; font-weight: 600; background: rgba(15, 23, 42, 0.9); color: #fff; border-radius: 6px; pointer-events: none; opacity: 0; z-index: 50; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div>
            <h1 id="db-title">Loading...</h1>
            <p id="db-subtitle">-</p>
        </div>
        <div id="branding-logos" style="display: flex; gap: 10px; align-items: center;">
            <!-- Logos injected here -->
        </div>
    </div>

    <div class="kpi-container" id="kpi-container">
        <!-- KPIs injected here -->
    </div>

    <div class="main-grid" id="main-grid">
        <!-- Panels injected here dynamically -->
    </div>

    <script>
        function init() {
            const data = window.INJECTED_DATA || {};
            if (data.config && data.config.border === 'none') {
                document.documentElement.style.setProperty('--border-color', 'transparent');
                document.documentElement.style.setProperty('--bg-color', 'transparent');
                document.body.style.backgroundColor = 'transparent';
            }
            if (data.theme) { document.documentElement.setAttribute('data-theme', data.theme); }
            
            const headerEl = document.querySelector('.dashboard-header');
            if (!data.title && !data.subtitle && !data.logos) {
                headerEl.style.display = 'none';
            } else {
                document.getElementById('db-title').innerText = data.title || "";
                document.getElementById('db-subtitle').innerText = data.subtitle || "";
                if (!data.title) document.getElementById('db-title').style.display = 'none';
                if (!data.subtitle) document.getElementById('db-subtitle').style.display = 'none';
                
                const brandingLogos = document.getElementById('branding-logos');
                if (data.logos) {
                    data.logos.forEach(logo => {
                        const img = document.createElement('img');
                        img.src = logo.src;
                        img.alt = logo.alt || 'Logo';
                        img.style = "height: 24px;";
                        brandingLogos.appendChild(img);
                    });
                }
            }

            const kpiCont = document.getElementById('kpi-container');
            if (!data.kpis || data.kpis.length === 0) {
                kpiCont.style.display = 'none';
            } else {
                kpiCont.innerHTML = '';
                data.kpis.forEach(kpi => {
                    const card = document.createElement('div');
                    card.className = 'kpi-card';
                    if (kpi.status) card.classList.add(kpi.status);
                    card.innerHTML = `
                        <div class="kpi-title">${kpi.title}</div>
                        <div class="kpi-value">${kpi.value}</div>
                        <div class="kpi-sub">${kpi.sub || ''}</div>
                    `;
                    kpiCont.appendChild(card);
                });
            }

            let gridLayout = data.grid || [];
            const mainGrid = document.getElementById('main-grid');
            mainGrid.innerHTML = '';
            let chartIndex = 0;

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const gridColor = isDark ? '#334155' : '#e2e8f0';
            const textColor = isDark ? '#94a3b8' : '#64748b';

            const isStandalone = !data.title && !data.subtitle && (!data.kpis || data.kpis.length === 0) && gridLayout.length === 1;

            gridLayout.forEach(panelData => {
                const panel = document.createElement('div');
                panel.className = 'panel';
                if (panelData.fullWidth || panelData.type === 'simulator') {
                    panel.classList.add('full-width');
                }
                
                if (panelData.title) {
                    const header = document.createElement('div');
                    header.className = 'panel-header';
                    header.innerText = panelData.title;
                    panel.appendChild(header);
                } else {
                    panel.style.padding = '0';
                    panel.style.border = 'none';
                    panel.style.background = 'transparent';
                    panel.style.boxShadow = 'none';
                    panel.style.height = isStandalone ? '100%' : 'auto';
                }

                if (panelData.type === 'chart') {
                    const canvasId = 'chartCanvas_' + (chartIndex++);
                    const chartContainer = document.createElement('div');
                    chartContainer.style = `position: relative; height: ${isStandalone ? 'calc(100vh - 90px)' : '200px'};`;
                    chartContainer.innerHTML = `<canvas id="${canvasId}"></canvas>`;
                    panel.appendChild(chartContainer);
                    mainGrid.appendChild(panel);

                    const ctx = document.getElementById(canvasId).getContext('2d');
                    new Chart(ctx, {
                        type: panelData.data.type || 'bar',
                        data: {
                            labels: panelData.data.labels,
                            datasets: panelData.data.datasets || [{
                                label: panelData.data.label || 'Metric',
                                data: panelData.data.data,
                                backgroundColor: 'rgba(37, 99, 235, 0.8)',
                                borderColor: 'rgba(37, 99, 235, 1)',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: { 
                                legend: { display: false },
                                tooltip: { enabled: true }
                            },
                            scales: {
                                y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
                                x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10 } } }
                            }
                        }
                    });

                } else if (panelData.type === 'table') {
                    const tableContainer = document.createElement('div');
                    tableContainer.style = "overflow-x: auto;";
                    
                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    const tbody = document.createElement('tbody');
                    
                    const headerRow = document.createElement('tr');
                    (panelData.data.headers || []).forEach(h => {
                        const th = document.createElement('th');
                        th.textContent = h;
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
                    
                    (panelData.data.rows || []).forEach(row => {
                        const tr = document.createElement('tr');
                        row.forEach((cell, i) => {
                            const td = document.createElement('td');
                            const h = (panelData.data.headers[i] || '').toLowerCase();
                            if (h.includes('score') || h.includes('rate') || h.includes('%')) {
                                const num = parseFloat(cell);
                                const classVal = num > 80 ? 'high' : (num > 60 ? 'medium' : '');
                                const badge = document.createElement('span');
                                badge.className = `badge ${classVal}`;
                                badge.textContent = `${cell}%`;
                                td.appendChild(badge);
                            } else {
                                td.textContent = cell;
                            }
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    
                    table.appendChild(thead);
                    table.appendChild(tbody);
                    tableContainer.appendChild(table);
                    panel.appendChild(tableContainer);
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'image') {
                    const container = document.createElement('div');
                    container.style = `text-align:center; height:${isStandalone?'100%':'auto'}; display:flex; align-items:center; justify-content:center;`;
                    const img = document.createElement('img');
                    img.src = panelData.data.src || panelData.data;
                    img.alt = panelData.data.alt || 'GenAI Image';
                    img.style = `max-height: ${isStandalone?'calc(100vh - 90px)':'500px'}; max-width: 100%; border-radius: 8px; object-fit: contain;`;
                    container.appendChild(img);
                    panel.appendChild(container);
                    mainGrid.appendChild(panel);

                } else if (panelData.type === '3p-widget') {
                    const wTitle = panelData.data.appName || '3P Application';
                    const iconUrl = panelData.data.appIcon || 'https://fonts.gstatic.com/s/i/short-term/release/googlesymbols/apps/default/24px.svg';
                    const primaryColor = panelData.data.themeColor || '#1a73e8';
                    
                    panel.style.padding = '0';
                    panel.innerHTML = `
                        <div style="display: flex; flex-direction: column; height: 100%; overflow: hidden; border-radius: inherit;">
                            <div style="display: flex; background: ${primaryColor}; padding: 12px 16px; color: #fff; align-items: center; gap: 10px;">
                                <img src="${iconUrl}" style="width:24px; height:24px; filter: brightness(0) invert(1);" alt="${wTitle}">
                                <span style="font-weight: 600; font-size: 1rem; letter-spacing: 0.3px;">${wTitle}</span>
                            </div>
                            <div style="flex: 1; padding: 20px; overflow-y: auto; background: ${isDark ? '#0f172a' : '#fff'};">
                                ${panelData.data.htmlContent || '<p style="color: grey; font-style: italic;">No widget content provided.</p>'}
                            </div>
                        </div>`;
                    mainGrid.appendChild(panel);
                } else if (panelData.type === 'map-heatmap') {
                    const containerId = 'mapCanvas_' + (chartIndex++);
                    const mapContainer = document.createElement('div');
                    mapContainer.id = containerId;
                    mapContainer.style = `position: relative; height: ${isStandalone?'calc(100vh - 90px)':'450px'}; background: rgba(0,0,0,0.02); border-radius: 8px; overflow: hidden;`;
                    panel.appendChild(mapContainer);
                    mainGrid.appendChild(panel);

                    setTimeout(() => {
                        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                        
                        const mapOptions = {
                            zoom: panelData.data.zoom || 11,
                            center: { lat: panelData.data.centerLat || 42.3601, lng: panelData.data.centerLng || -71.0589 },
                            mapTypeId: 'roadmap',
                            disableDefaultUI: true,
                            styles: isDark ? [
                                { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                                { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                                { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                                { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                                { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                                { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                                { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
                                { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
                                { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
                                { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#f3d19c" }] },
                                { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
                                { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
                            ] : [
                                { featureType: "administrative.land_parcel", stylers: [{ visibility: "off" }] },
                                { featureType: "administrative.neighborhood", stylers: [{ visibility: "off" }] }
                            ]
                        };

                        const map = new google.maps.Map(document.getElementById(containerId), mapOptions);

                        if (panelData.data.points) {
                            const heatData = panelData.data.points.map(p => {
                                if (Array.isArray(p)) return new google.maps.LatLng(p[0], p[1]);
                                return {
                                    location: new google.maps.LatLng(p.lat, p.lng),
                                    weight: (p.weight || p.competitor_spike || 1.0) * 10
                                };
                            });
                            
                            const heatmap = new google.maps.visualization.HeatmapLayer({
                                data: heatData,
                                radius: panelData.data.radius ? panelData.data.radius * 2 : 35, 
                                opacity: 0.8,
                                map: map
                            });

                            const infoWindow = new google.maps.InfoWindow();
                            panelData.data.points.forEach(p => {
                                if (!Array.isArray(p) && (p.tooltip || p.physician_name) && p.lat && p.lng) {
                                    const tooltipDiv = document.createElement('div');
                                    tooltipDiv.style = "font-family: Inter, sans-serif; font-size: 13px; text-align: center; color: #1e293b; margin-top: 2px; padding: 2px;";
                                    
                                    const b = document.createElement('b');
                                    b.textContent = p.physician_name || p.tooltip;
                                    tooltipDiv.appendChild(b);
                                    
                                    if (p.spike_metric) {
                                        tooltipDiv.appendChild(document.createElement('br'));
                                        const span = document.createElement('span');
                                        span.style = "color: #64748b; font-size: 11px;";
                                        span.textContent = p.spike_metric;
                                        tooltipDiv.appendChild(span);
                                    }

                                    const marker = new google.maps.Marker({
                                        position: { lat: p.lat, lng: p.lng },
                                        map: map,
                                        title: p.physician_name || p.tooltip
                                    });

                                    marker.addListener("mouseover", () => {
                                        infoWindow.setContent(tooltipDiv);
                                        infoWindow.open({
                                            anchor: marker,
                                            map,
                                            shouldFocus: false
                                        });
                                    });
                                    marker.addListener("mouseout", () => {
                                        infoWindow.close();
                                    });
                                }
                            });
                        }
                    }, 50);

                } else if (panelData.type === 'simulator') {
                    const canvasId = 'simChart_' + (chartIndex++);
                    const container = document.createElement('div');
                    container.style = `display: flex; flex-wrap: wrap; gap: 20px; align-items: stretch;`;
                    
                    const controlsDiv = document.createElement('div');
                    controlsDiv.style = `flex: 1; min-width: 220px; padding: 12px 16px; background: ${isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)'}; border-radius: 8px; border: 1px solid ${isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'};`;
                    
                    const title = document.createElement('h4');
                    title.style = "margin-top: 0; margin-bottom: 12px; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase;";
                    title.textContent = "Variables";
                    controlsDiv.appendChild(title);
                    
                    (panelData.data.controls || []).forEach((c, i) => {
                        const ctrlDiv = document.createElement('div');
                        ctrlDiv.style = "margin-bottom: 12px; font-size: 0.85rem;";
                        ctrlDiv.style.color = textColor;
                        
                        const label = document.createElement('label');
                        label.style = "display:flex; justify-content:space-between; margin-bottom: 4px; font-weight: 500;";
                        
                        const spanLabel = document.createElement('span');
                        spanLabel.textContent = c.label;
                        label.appendChild(spanLabel);
                        
                        const spanVal = document.createElement('span');
                        spanVal.id = `val_${canvasId}_${i}`;
                        spanVal.textContent = c.value;
                        label.appendChild(spanVal);
                        
                        ctrlDiv.appendChild(label);
                        
                        const input = document.createElement('input');
                        input.type = "range";
                        input.id = `param_${canvasId}_${i}`;
                        input.min = c.min;
                        input.max = c.max;
                        input.step = c.step || 1;
                        input.value = c.value;
                        input.style = "width: 100%; cursor: pointer;";
                        input.oninput = function() {
                            document.getElementById(`val_${canvasId}_${i}`).innerText = this.value;
                            window[`updateSimulator_${canvasId}`]();
                        };
                        ctrlDiv.appendChild(input);
                        
                        controlsDiv.appendChild(ctrlDiv);
                    });
                    
                    const chartDiv = document.createElement('div');
                    chartDiv.style = "flex: 2; min-width: 280px; position: relative; height: 220px;";
                    const canvas = document.createElement('canvas');
                    canvas.id = canvasId;
                    chartDiv.appendChild(canvas);
                    
                    container.appendChild(controlsDiv);
                    container.appendChild(chartDiv);
                    panel.appendChild(container);
                    mainGrid.appendChild(panel);
                    
                    setTimeout(() => {
                        const ctx = document.getElementById(canvasId).getContext('2d');
                        Chart.defaults.color = textColor;
                        Chart.defaults.borderColor = gridColor;
                        let baseConfig = panelData.data.chartConfig || {};
                        baseConfig.options = baseConfig.options || {};
                        baseConfig.options.plugins = baseConfig.options.plugins || {};
                        baseConfig.options.plugins.legend = { display: false };
                        baseConfig.options.scales = baseConfig.options.scales || {};
                        baseConfig.options.scales.y = baseConfig.options.scales.y || {};
                        baseConfig.options.scales.y.max = 120;
                        baseConfig.options.scales.y.suggestedMax = 120;
                        baseConfig.options.responsive = true;
                        baseConfig.options.maintainAspectRatio = false;
                        const simChart = new Chart(ctx, baseConfig);
                        window[`updateSimulator_${canvasId}`] = () => {
                            const params = (panelData.data.controls || []).map((c, i) => parseFloat(document.getElementById(`param_${canvasId}_${i}`).value));
                            if (panelData.data.onUpdateBody) {
                                try {
                                   const updateFn = new Function('chart', 'params', panelData.data.onUpdateBody);
                                   updateFn(simChart, params);
                                   
                                   if (simChart.data.datasets && simChart.data.datasets.length > 0) {
                                       simChart.data.datasets[0].backgroundColor = [
                                           'rgba(239, 68, 68, 0.85)',
                                           'rgba(37, 99, 235, 0.85)'
                                       ];
                                       simChart.data.datasets[0].borderColor = ['rgba(239, 68, 68, 1)', 'rgba(37, 99, 235, 1)'];
                                       simChart.data.datasets[0].borderWidth = 1;
                                   }
                                   
                                   simChart.update();
                                } catch(e) { console.error("Simulator logic error:", e); }
                            }
                        };
                        window[`updateSimulator_${canvasId}`]();
                    }, 50);
                }
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
