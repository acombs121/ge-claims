<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY_HERE&libraries=visualization"></script>
    
    <!-- LEAFLET FALLBACK ENGINE (Uncomment scripts below and JS block to revert to Leaflet)
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-primary: #2563eb;
            --accent-secondary: #4f46e5;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --border-color: #334155;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            font-size: 14px;
            overflow-x: hidden;
        }
        .dashboard-header {
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .dashboard-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dashboard-header p {
            color: var(--text-secondary);
            margin: 4px 0 0 0;
        }
        .kpi-container {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .kpi-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            flex: 1;
            min-width: 120px;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        .kpi-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-primary);
            margin-right: 6px;
            margin-bottom: 1px;
        }
        .kpi-card.warning .kpi-title::before { background: var(--warning); }
        .kpi-card.success .kpi-title::before { background: var(--success); }
        .kpi-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 4px 0;
        }
        .kpi-sub {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        
        /* Override Google Maps InfoWindow Defaults */
        .gm-ui-hover-effect { display: none !important; }
        .gm-style .gm-style-iw-c { padding: 8px 10px !important; border-radius: 8px !important; }
        .gm-style-iw-d { padding: 0 !important; overflow: auto !important; }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .main-grid > .panel:last-child:nth-child(odd) {
            grid-column: 1 / -1;
        }
        .panel-header {
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.75rem;
        }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
        }
        .badge.high { background-color: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.medium { background-color: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; background: var(--bg-color); color: var(--text-primary); transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: var(--accent-primary); }
        .btn-submit { background: var(--accent-primary); color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s, background-color 0.2s; }
        .btn-submit:hover { opacity: 0.9; }
        .d3-tooltip { position: absolute; text-align: center; padding: 6px 10px; font-size: 11px; font-weight: 600; background: rgba(15, 23, 42, 0.9); color: #fff; border-radius: 6px; pointer-events: none; opacity: 0; z-index: 50; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1 id="db-title">Loading...</h1>
        <p id="db-subtitle">-</p>
    </div>

    <div class="kpi-container" id="kpi-container">
        <!-- KPIs injected here -->
    </div>

    <div class="main-grid" id="main-grid">
        <!-- Panels injected here dynamically -->
    </div>

    <!-- DATA INJECTION POINT -->
    <script>
        function init() {
            const data = window.INJECTED_DATA || {};
            if (data.theme) { document.documentElement.setAttribute('data-theme', data.theme); }
            
            const headerEl = document.querySelector('.dashboard-header');
            if (!data.title && !data.subtitle) {
                headerEl.style.display = 'none';
            } else {
                document.getElementById('db-title').innerText = data.title || "";
                document.getElementById('db-subtitle').innerText = data.subtitle || "";
                if (!data.title) document.getElementById('db-title').style.display = 'none';
                if (!data.subtitle) document.getElementById('db-subtitle').style.display = 'none';
            }

            const kpiCont = document.getElementById('kpi-container');
            if (!data.kpis || data.kpis.length === 0) {
                kpiCont.style.display = 'none';
            } else {
                kpiCont.innerHTML = '';
                data.kpis.forEach(kpi => {
                    const card = document.createElement('div');
                    card.className = 'kpi-card';
                    if (kpi.status) card.classList.add(kpi.status);
                    card.innerHTML = `
                        <div class="kpi-title">${kpi.title}</div>
                        <div class="kpi-value">${kpi.value}</div>
                        <div class="kpi-sub">${kpi.sub || ''}</div>
                    `;
                    kpiCont.appendChild(card);
                });
            }

            // Normalize legacy output to the new grid array format
            let gridLayout = data.grid || [];
            if (gridLayout.length === 0) {
                if (data.chart) gridLayout.push({type: 'chart', title: data.chart_title || 'Visual Analysis', data: data.chart});
                if (data.table) gridLayout.push({type: 'table', title: data.table_title || 'Tabular Data', data: data.table});
            }

            const mainGrid = document.getElementById('main-grid');
            mainGrid.innerHTML = '';
            let chartIndex = 0;

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const gridColor = isDark ? '#334155' : '#e2e8f0';
            const textColor = isDark ? '#94a3b8' : '#64748b';

            const isStandalone = !data.title && !data.subtitle && (!data.kpis || data.kpis.length === 0) && gridLayout.length === 1;
            const dynamicPanelHeight = isStandalone ? 'calc(100vh - 90px)' : '350px';

            gridLayout.forEach(panelData => {
                const panel = document.createElement('div');
                panel.className = 'panel';
                
                if (panelData.title) {
                    const header = document.createElement('div');
                    header.className = 'panel-header';
                    header.innerText = panelData.title;
                    panel.appendChild(header);
                } else {
                    panel.style.padding = '0';
                    panel.style.border = 'none';
                    panel.style.background = 'transparent';
                    panel.style.boxShadow = 'none';
                    panel.style.height = isStandalone ? '100%' : 'auto';
                }

                if (panelData.type === 'chart') {
                    const canvasId = 'chartCanvas_' + (chartIndex++);
                    const chartContainer = document.createElement('div');
                    chartContainer.style = `position: relative; height: ${isStandalone ? 'calc(100vh - 90px)' : '250px'};`;
                    chartContainer.innerHTML = `<canvas id="${canvasId}"></canvas>`;
                    panel.appendChild(chartContainer);
                    mainGrid.appendChild(panel);

                    const ctx = document.getElementById(canvasId).getContext('2d');
                    new Chart(ctx, {
                        type: panelData.data.type || 'bar',
                        data: {
                            labels: panelData.data.labels,
                            datasets: [{
                                label: panelData.data.label || 'Metric',
                                data: panelData.data.data,
                                backgroundColor: 'rgba(37, 99, 235, 0.8)',
                                borderColor: 'rgba(37, 99, 235, 1)',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { 
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) label += ': ';
                                            if (context.parsed.y !== null) label += context.parsed.y;
                                            if (panelData.data.extra_labels && panelData.data.extra_labels[context.dataIndex]) {
                                                label += ' (' + panelData.data.extra_labels[context.dataIndex] + ')';
                                            }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: { max: panelData.data.yMax || undefined, grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
                                x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10 } } }
                            }
                        }
                    });

                } else if (panelData.type === 'table') {
                    const tableContainer = document.createElement('div');
                    tableContainer.style = "overflow-x: auto;";
                    
                    const ths = (panelData.data.headers || []).map(h => `<th>${h}</th>`).join('');
                    const trs = (panelData.data.rows || []).map(row => {
                        const tds = row.map((cell, i) => {
                            const h = (panelData.data.headers[i] || '').toLowerCase();
                            if (h.includes('score') || h.includes('rate') || h.includes('%')) {
                                const num = parseFloat(cell);
                                const classVal = num > 80 ? 'high' : (num > 60 ? 'medium' : '');
                                return `<td><span class="badge ${classVal}">${cell}%</span></td>`;
                            }
                            return `<td>${cell}</td>`;
                        }).join('');
                        return `<tr>${tds}</tr>`;
                    }).join('');

                    tableContainer.innerHTML = `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
                    panel.appendChild(tableContainer);
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'vega') {
                    const vegaId = 'vegaCanvas_' + (chartIndex++);
                    const vegaContainer = document.createElement('div');
                    vegaContainer.id = vegaId;
                    vegaContainer.style = `position: relative; height: ${dynamicPanelHeight}; width: 100%; overflow: hidden;`;
                    panel.appendChild(vegaContainer);
                    mainGrid.appendChild(panel);

                    setTimeout(() => {
                        vegaEmbed('#' + vegaId, panelData.data || panelData.config, {
                            actions: false,
                            theme: document.documentElement.getAttribute('data-theme')
                        }).catch(console.error);
                    }, 50);

                } else if (panelData.type === 'form') {
                    const formContainer = document.createElement('div');
                    let formHtml = `<form onsubmit="event.preventDefault(); const formData = new FormData(this); const payload = Object.fromEntries(formData); console.log('Form Submitted: ', payload); if(window.parent) { window.parent.postMessage({type: 'a2a.action', actionId: 'custom_form_submit', actionData: payload}, '*'); } const btn = this.querySelector('.btn-submit'); btn.innerText = 'Sent!'; btn.style.background = 'var(--success)'; this.querySelectorAll('.form-input').forEach(i => i.style.opacity = '0.5'); ">`;
                    
                    (panelData.data.fields || []).forEach(f => {
                        formHtml += `<div class="form-group">`;
                        if (f.label) formHtml += `<label class="form-label">${f.label}</label>`;
                        if (f.type === 'textarea') {
                            formHtml += `<textarea class="form-input" name="${f.name||''}" rows="3" ${f.required?'required':''}></textarea>`;
                        } else if (f.type === 'select') {
                            formHtml += `<select class="form-input" name="${f.name||''}">`;
                            (f.options || []).forEach(opt => { formHtml += `<option value="${opt}">${opt}</option>`; });
                            formHtml += `</select>`;
                        } else {
                            formHtml += `<input class="form-input" type="${f.type||'text'}" name="${f.name||''}" ${f.required?'required':''}>`;
                        }
                        formHtml += `</div>`;
                    });
                    
                    formHtml += `<div style="text-align: right;"><button type="submit" class="btn-submit">${panelData.data.submitLabel || 'Submit'}</button></div></form>`;
                    formContainer.innerHTML = formHtml;
                    panel.appendChild(formContainer);
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'd3-network') {
                    const containerId = 'd3Canvas_' + (chartIndex++);
                    const d3Container = document.createElement('div');
                    d3Container.id = containerId;
                    d3Container.style = `position: relative; height: ${isStandalone ? 'calc(100vh - 20px)' : '450px'}; background: rgba(0,0,0,0.02); border-radius: 8px; overflow: hidden;`;
                    panel.appendChild(d3Container);
                    mainGrid.appendChild(panel);

                    setTimeout(() => {
                        const width = document.getElementById(containerId).clientWidth;
                        const height = document.getElementById(containerId).clientHeight || 350;
                        const svg = d3.select("#" + containerId).append("svg")
                            .attr("width", width).attr("height", height);

                        const nodes = panelData.data.nodes || [];
                        const links = panelData.data.edges || [];

                        // Inject Absolute Overlay Title
                        const titleOverlay = document.createElement('div');
                        titleOverlay.style = `position: absolute; top: 16px; left: 20px; z-index: 10; pointer-events: none; font-family: Inter, sans-serif;`;
                        titleOverlay.innerHTML = `<h3 style="margin: 0; font-size: 13px; font-weight: 600; color: ${textColor}; letter-spacing: 0.5px;">RELATIONSHIP GRAPH</h3><p style="margin: 2px 0 0 0; font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Geographic & Peer Influences</p>`;
                        d3Container.appendChild(titleOverlay);

                        const simulation = d3.forceSimulation(nodes)
                            .force("link", d3.forceLink(links).id(d => d.id).distance(100))
                            .force("charge", d3.forceManyBody().strength(-300))
                            .force("center", d3.forceCenter(width / 2, height / 2));

                        const link = svg.append("g")
                            .selectAll("line").data(links).join("line")
                            .attr("stroke", gridColor).attr("stroke-width", 2);

                        // Setup tooltip
                        const tooltip = d3.select(d3Container).append("div")
                            .attr("class", "d3-tooltip");

                        const node = svg.append("g")
                            .selectAll("circle").data(nodes).join("circle")
                            .attr("r", d => d.radius || 12)
                            .attr("fill", d => d.color ? d.color : (d.npi ? 'var(--accent-primary)' : '#94a3b8'))
                            .on("mouseover", function(event, d) {
                                tooltip.transition().duration(200).style("opacity", 1);
                                
                                // Auto-hydrate random LLM object keys for richer hover context
                                const exclude = ['id', 'label', 'x', 'y', 'vx', 'vy', 'index', 'fx', 'fy', 'radius', 'color', 'group', 'value', 'title', 'tooltip'];
                                const extraProps = Object.entries(d).filter(([k]) => !exclude.includes(k) && typeof d[k] !== 'object');
                                const extraHtml = extraProps.map(([k,v]) => `<br/><span style="color:#64748b; font-size:9px; text-transform:uppercase; letter-spacing:0.5px; font-weight:700;">${k}:</span> <span style="color:#cbd5e1; font-size:10px;">${v}</span>`).join('');
                                const tooltipTextHtml = d.tooltip ? `<div style="color:#cbd5e1; font-size:10.5px; line-height:1.3; margin-top:4px; max-width: 180px;">${d.tooltip}</div>` : '';
                                
                                tooltip.html('<strong style="font-size:12px;">' + d.label + '</strong>' + (d.value ? `<br/><span style="color:#94a3b8; font-weight:400; font-size:11px;">Measurement: ${d.value}</span>` : '') + tooltipTextHtml + extraHtml)
                                    .style("left", (event.offsetX + 15) + "px")
                                    .style("top", (event.offsetY - 20) + "px");
                            })
                            .on("mouseout", function(d) {
                                tooltip.transition().duration(200).style("opacity", 0);
                            })
                            .call(d3.drag()
                                .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                                .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
                                .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

                        // node.append("title").text(d => d.label); // Disabling default title since we have rich tooltip
                        const labels = svg.append("g").selectAll("text").data(nodes).join("text")
                            .attr("dy", -18).attr("text-anchor", "middle").text(d => d.label)
                            .style("font-size", "10px").style("font-weight", "600").style("fill", textColor);

                        simulation.on("tick", () => {
                            const padding = 20;
                            node.attr("cx", d => d.x = Math.max(padding, Math.min(width - padding, d.x)))
                                .attr("cy", d => d.y = Math.max(padding, Math.min(height - padding, d.y)));
                            
                            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

                            labels.attr("x", d => d.x).attr("y", d => d.y);
                        });
                    }, 50);

                } else if (panelData.type === 'map-heatmap') {
                    const containerId = 'mapCanvas_' + (chartIndex++);
                    const mapContainer = document.createElement('div');
                    mapContainer.id = containerId;
                    mapContainer.style = `position: relative; height: ${dynamicPanelHeight}; background: rgba(0,0,0,0.02); border-radius: 8px; overflow: hidden;`;
                    panel.appendChild(mapContainer);
                    mainGrid.appendChild(panel);

                    setTimeout(() => {
                        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                        
                        const mapOptions = {
                            zoom: panelData.data.zoom || 11,
                            center: { lat: panelData.data.centerLat || 42.3601, lng: panelData.data.centerLng || -71.0589 },
                            mapTypeId: 'roadmap',
                            disableDefaultUI: true,
                            styles: isDark ? [
                                { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                                { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                                { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                                { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                                { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                                { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                                { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
                                { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
                                { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
                                { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#f3d19c" }] },
                                { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                                { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
                                { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
                            ] : [
                                { featureType: "administrative.land_parcel", stylers: [{ visibility: "off" }] },
                                { featureType: "administrative.neighborhood", stylers: [{ visibility: "off" }] }
                            ]
                        };

                        const map = new google.maps.Map(document.getElementById(containerId), mapOptions);

                        if (panelData.data.points) {
                            const heatData = panelData.data.points.map(p => {
                                if (Array.isArray(p)) return new google.maps.LatLng(p[0], p[1]);
                                return {
                                    location: new google.maps.LatLng(p.lat, p.lng),
                                    weight: (p.weight || p.competitor_spike || 1.0) * 10
                                };
                            });
                            
                            const heatmap = new google.maps.visualization.HeatmapLayer({
                                data: heatData,
                                radius: panelData.data.radius ? panelData.data.radius * 2 : 35, 
                                opacity: 0.8,
                                map: map,
                                gradient: [
                                  "rgba(0, 255, 255, 0)",
                                  "rgba(0, 255, 255, 1)",
                                  "rgba(0, 191, 255, 1)",
                                  "rgba(0, 127, 255, 1)",
                                  "rgba(0, 63, 255, 1)",
                                  "rgba(0, 0, 255, 1)",
                                  "rgba(0, 0, 223, 1)",
                                  "rgba(0, 0, 191, 1)",
                                  "rgba(0, 0, 159, 1)",
                                  "rgba(0, 0, 127, 1)",
                                  "rgba(63, 0, 91, 1)",
                                  "rgba(127, 0, 63, 1)",
                                  "rgba(191, 0, 31, 1)",
                                  "rgba(255, 0, 0, 1)"
                                ]
                            });

                            const infoWindow = new google.maps.InfoWindow();
                            panelData.data.points.forEach(p => {
                                if (!Array.isArray(p) && (p.tooltip || p.physician_name) && p.lat && p.lng) {
                                    const tooltipHtml = p.physician_name && p.spike_metric
                                        ? `<div style="font-family: Inter, sans-serif; font-size: 13px; text-align: center; color: #1e293b; margin-top: 2px; padding: 2px;"><b>${p.physician_name}</b><br/><span style="color: #64748b; font-size: 11px;">${p.spike_metric}</span></div>`
                                        : `<div style="font-family: Inter, sans-serif; font-size: 13px; text-align: center; color: #1e293b; margin-top: 2px; padding: 2px;"><b>${p.tooltip}</b></div>`;

                                    const marker = new google.maps.Marker({
                                        position: { lat: p.lat, lng: p.lng },
                                        map: map,
                                        title: p.physician_name || p.tooltip,
                                        icon: {
                                            path: google.maps.SymbolPath.CIRCLE,
                                            fillColor: '#ef4444',
                                            fillOpacity: 0.2,
                                            strokeColor: '#ef4444',
                                            strokeWeight: 2,
                                            scale: 8
                                        }
                                    });

                                    marker.addListener("mouseover", () => {
                                        infoWindow.setContent(tooltipHtml);
                                        infoWindow.open({
                                            anchor: marker,
                                            map,
                                            shouldFocus: false
                                        });
                                    });
                                    marker.addListener("mouseout", () => {
                                        infoWindow.close();
                                    });
                                }
                            });
                        }

                        // --- LEAFLET IMPLEMENTATION (Commented-out Fallback) ---
                        /*
                        const map = L.map(containerId).setView([panelData.data.centerLat || 0, panelData.data.centerLng || 0], panelData.data.zoom || 2);
                        
                        const tileUrl = isDark 
                            ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                            : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
                            
                        L.tileLayer(tileUrl, {
                            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
                        }).addTo(map);

                        if (panelData.data.points) {
                            const heatData = panelData.data.points.map(p => {
                                if (Array.isArray(p)) return p;
                                return [p.lat, p.lng, p.weight || p.competitor_spike || 1.0];
                            });
                            
                            L.heatLayer(heatData, {
                                radius: panelData.data.radius || 20, 
                                blur: panelData.data.blur || 5,
                                max: panelData.data.max || 0.6,
                                maxZoom: panelData.data.maxZoom || 17
                            }).addTo(map);

                            panelData.data.points.forEach(p => {
                                if (!Array.isArray(p) && (p.tooltip || p.physician_name) && p.lat && p.lng) {
                                    const tooltipHtml = p.physician_name && p.spike_metric
                                        ? `<div style="font-family: Inter, sans-serif; font-size: 12px; text-align: center;"><b>${p.physician_name}</b><br/><span style="color: #555; font-size: 11px;">${p.spike_metric}</span></div>`
                                        : `<div style="font-family: Inter, sans-serif; font-size: 12px; text-align: center;"><b>${p.tooltip}</b></div>`;
                                        
                                    L.circleMarker([p.lat, p.lng], {
                                        radius: 12, fillOpacity: 0, stroke: false, interactive: true
                                    }).bindTooltip(tooltipHtml, {
                                        permanent: false, direction: 'top'
                                    }).addTo(map);
                                }
                            });
                        }
                        */
                        
                    }, 50);

                } else if (panelData.type === 'image') {
                    panel.innerHTML += `<div style="text-align:center; height:${isStandalone?'100%':'auto'}; display:flex; align-items:center; justify-content:center;"><img src="${panelData.data.src || panelData.data}" alt="${panelData.data.alt || 'GenAI Image'}" style="max-height: ${isStandalone?'calc(100vh - 90px)':'500px'}; max-width: 100%; border-radius: 8px; object-fit: contain;"></div>`;
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'video') {
                    panel.innerHTML += `<div style="text-align:center; height:${isStandalone?'100%':'auto'}; display:flex; align-items:center; justify-content:center;"><video controls style="max-height: ${isStandalone?'calc(100vh - 90px)':'500px'}; max-width: 100%; border-radius: 8px;"><source src="${panelData.data.src || panelData.data}" type="${panelData.data.mime_type || 'video/mp4'}">Your browser does not support the video tag.</video></div>`;
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'audio') {
                    panel.innerHTML += `<div style="text-align:center;"><audio controls style="width: 100%; margin-top: 10px;"><source src="${panelData.data.src || panelData.data}" type="${panelData.data.mime_type || 'audio/mpeg'}">Your browser does not support the audio element.</audio></div>`;
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'simulator') {
                    const canvasId = 'simChart_' + (chartIndex++);
                    const controlsHTML = (panelData.data.controls || []).map((c, i) => `
                        <div style="margin-bottom: 12px; font-size: 0.85rem; color: ${textColor};">
                            <label style="display:flex; justify-content:space-between; margin-bottom: 4px; font-weight: 500;">
                                <span>${c.label}</span>
                                <span id="val_${canvasId}_${i}">${c.value}</span>
                            </label>
                            <input type="range" id="param_${canvasId}_${i}" min="${c.min}" max="${c.max}" step="${c.step||1}" value="${c.value}" style="width: 100%; cursor: pointer;" oninput="document.getElementById('val_${canvasId}_${i}').innerText=this.value; window.updateSimulator_${canvasId}()">
                        </div>`).join('');
                    
                    panel.innerHTML += `
                        <div style="display: flex; gap: 20px; height: ${isStandalone?'calc(100vh - 90px)':'500px'};">
                            <div style="flex: 1; min-width: 200px; padding: 16px; background: ${isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)'}; border-radius: 8px; overflow-y: auto; border: 1px solid ${isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'};">
                                <h4 style="margin-top: 0; margin-bottom: 16px; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;">Variables</h4>
                                ${controlsHTML}
                            </div>
                            <div style="flex: 2; position: relative;">
                                <canvas id="${canvasId}"></canvas>
                            </div>
                        </div>`;
                    mainGrid.appendChild(panel);
                    
                    setTimeout(() => {
                        const ctx = document.getElementById(canvasId).getContext('2d');
                        Chart.defaults.color = textColor;
                        Chart.defaults.borderColor = gridColor;
                        let baseConfig = panelData.data.chartConfig || {};
                        baseConfig.options = baseConfig.options || {};
                        baseConfig.options.plugins = baseConfig.options.plugins || {};
                        baseConfig.options.plugins.legend = { display: false };
                        baseConfig.options.scales = baseConfig.options.scales || {};
                        baseConfig.options.scales.y = baseConfig.options.scales.y || {};
                        baseConfig.options.scales.y.max = 120;
                        baseConfig.options.scales.y.suggestedMax = 120;
                        baseConfig.options.responsive = true;
                        baseConfig.options.maintainAspectRatio = false;
                        const simChart = new Chart(ctx, baseConfig);
                        window[`updateSimulator_${canvasId}`] = () => {
                            const params = (panelData.data.controls || []).map((c, i) => parseFloat(document.getElementById(`param_${canvasId}_${i}`).value));
                            if (panelData.data.onUpdateBody) {
                                try {
                                   const updateFn = new Function('chart', 'params', panelData.data.onUpdateBody);
                                   updateFn(simChart, params);
                                   simChart.update();
                                } catch(e) { console.error("Simulator logic error:", e); }
                            }
                        };
                        // Initial Trigger
                        window[`updateSimulator_${canvasId}`]();
                    }, 50);

                } else if (panelData.type === '3p-widget') {
                    const wTitle = panelData.data.appName || '3P Application';
                    const iconUrl = panelData.data.appIcon || 'https://fonts.gstatic.com/s/i/short-term/release/googlesymbols/apps/default/24px.svg';
                    const primaryColor = panelData.data.themeColor || '#1a73e8';
                    panel.style.padding = '0'; // Custom padding for widget layout
                    
                    panel.innerHTML += `
                        <div style="display: flex; flex-direction: column; height: ${isStandalone?'calc(100vh - 50px)':'100%'}; overflow: hidden; border-radius: inherit;">
                            <div style="background: ${primaryColor}; padding: 12px 16px; color: #fff; display: flex; align-items: center; gap: 10px;">
                                <img src="${iconUrl}" style="width:24px; height:24px; filter: brightness(0) invert(1);" alt="${wTitle}">
                                <span style="font-weight: 600; font-size: 1rem; letter-spacing: 0.3px;">${wTitle}</span>
                            </div>
                            <div style="flex: 1; padding: 20px; overflow-y: auto; background: ${isDark ? '#0f172a' : '#fff'};">
                                ${panelData.data.htmlContent || '<p style="color: grey; font-style: italic;">No widget content provided.</p>'}
                            </div>
                        </div>`;
                    mainGrid.appendChild(panel);

                } else if (panelData.type === 'crm-action-plan') {
                    const existingHeader = panel.querySelector('.panel-header');
                    if (existingHeader) existingHeader.remove();
                    
                    const primaryColor = isDark ? '#38bdf8' : '#2563eb';
                    const logoUrl = isDark ? 'https://crm-mock-app-g2u64mk5wq-uc.a.run.app/logos/light-logo.png' : 'https://crm-mock-app-g2u64mk5wq-uc.a.run.app/logos/dark-logo.png';
                    const inputBg = isDark ? '#334155' : '#ffffff';
                    const physicianName = panelData.data.physician_name || "Dr. Aris Thorne";
                    const numSteps = (panelData.data.steps || []).length;

                    let jsCode = `
                        event.preventDefault();
                        const formData = new FormData(this);
                        const rawEntries = Object.fromEntries(formData);
                        const steps = [];
                        for(let i=0; i<${numSteps}; i++) {
                            steps.push({
                                step_order: i+1,
                                title: rawEntries['title_'+i],
                                activity_type: rawEntries['activity_type_'+i],
                                scheduled_date: rawEntries['scheduled_date_'+i] || new Date().toISOString().split('T')[0],
                                description: rawEntries['description_'+i],
                                status: 'Queued'
                            });
                        }
                        const payloadData = {
                            account: { physician_name: '${physicianName.replace(/'/g, "\\'")}', crm_id: 'V-GENERATED' },
                            action_type: 'COMMIT_WIN_BACK_PLAN',
                            timestamp: new Date().toISOString(),
                            journey_steps: steps
                        };
                        console.log('CRM Plan Submitted:', payloadData);
                        
                        fetch('https://crm-mock-app-g2u64mk5wq-uc.a.run.app/api/interactions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payloadData)
                        }).then(r => console.log('Direct CRM Post result:', r.status)).catch(e => console.error(e));
                        
                        const btn = this.querySelector('.btn-submit');
                        btn.innerText = 'Syncing to CRM...';
                        btn.style.background = 'var(--success)';
                        setTimeout(() => { btn.innerText = 'Submitted'; }, 1500);
                    `.replace(/\n/g, "");

                    let stepsHtml = '';
                    (panelData.data.steps || []).forEach((step, i) => {
                        stepsHtml += `
                            <div style="background: ${isDark ? '#1e293b' : '#f8fafc'}; border: 1px solid ${gridColor}; border-radius: 8px; padding: 16px; margin-bottom: 16px; position: relative;">
                                <div style="position: absolute; top: -10px; left: 16px; background: ${primaryColor}; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold;">
                                    Step ${step.step_order || (i + 1)}
                                </div>
                                <div class="form-group" style="margin-top: 8px;">
                                    <label class="form-label">Title</label>
                                    <input class="form-input" style="background: ${inputBg};" name="title_${i}" value="${(step.title || '').replace(/"/g, '&quot;')}">
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                    <div class="form-group">
                                        <label class="form-label">Activity Type</label>
                                        <input class="form-input" style="background: ${inputBg};" name="activity_type_${i}" value="${(step.activity_type || '').replace(/"/g, '&quot;')}">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">Scheduled Date</label>
                                        <input class="form-input" style="background: ${inputBg};" type="date" name="scheduled_date_${i}" value="${step.scheduled_date || ''}">
                                    </div>
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Clinical / RAG Description</label>
                                    <textarea class="form-input" style="background: ${inputBg};" name="description_${i}" rows="3">${(step.description || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                                </div>
                            </div>
                        `;
                    });

                    panel.style.padding = '0';
                    panel.style.overflow = 'hidden';
                    panel.innerHTML += `
                        <div style="display: flex; flex-direction: column; height: ${isStandalone ? 'calc(100vh - 20px)' : '100%'};">
                            <div style="padding: 16px 20px; border-bottom: 1px solid ${gridColor}; display: flex; justify-content: space-between; align-items: center; background: #0f172a; border-radius: 12px 12px 0 0;">
                                <img src="https://crm-mock-app-g2u64mk5wq-uc.a.run.app/logos/light-logo.png" alt="CRM Logo" style="height: 24px;">
                            </div>
                            <div style="flex: 1; overflow-y: auto; padding: 20px; background: ${isDark ? '#0f172a' : '#ffffff'}; border-radius: 0 0 12px 12px;">
                                <form onsubmit="${jsCode}">
                                    ${stepsHtml}
                                    <div style="text-align: right; margin-top: 16px;">
                                        <button type="submit" class="btn-submit" style="background: ${primaryColor}; padding: 12px 32px; font-size: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">Submit to CRM</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `;
                    mainGrid.appendChild(panel);
                }
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
