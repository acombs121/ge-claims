<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: #f8fafc;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .custom-popup .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        function init() {
            const data = window.INJECTED_DATA || {
                center: [41.8781, -87.6298], // Chicago
                zoom: 11,
                markers: [
                    { lat: 41.8756, lng: -87.6244, title: "Site Alpha", desc: "burdered cost $20k" }
                ]
            };

            if (data.theme) { document.documentElement.setAttribute('data-theme', data.theme); }
            const map = L.map('map').setView(data.center, data.zoom);

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const tileUrl = isDark 
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

            L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                maxZoom: 19
            }).addTo(map);

            (data.markers || []).forEach(m => {
                const marker = L.marker([m.lat, m.lng]).addTo(map);
                if (m.title) {
                    marker.bindPopup(`<b style="color:#38bdf8">${m.title}</b><br>${m.desc || ''}`, {
                        className: 'custom-popup'
                    });
                    if (m.open) marker.openPopup();
                }
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
